services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zakaz}
      POSTGRES_USER: ${POSTGRES_USER:-zakaz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zakaz}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://zakaz:zakaz@postgres:5432/zakaz
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./connectors:/app/connectors:ro
    expose:
      - "8000"

  worker:
    build: ./backend
    env_file:
      - path: .env
        required: false
    command: python -m app.workers.scheduler
    environment:
      DATABASE_URL: postgresql+psycopg://zakaz:zakaz@postgres:5432/zakaz
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./connectors:/app/connectors:ro

  frontend:
    build: ./frontend
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
